<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gisoe Coffee - Menu</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- Header -->
<header class="header">
  <span class="header-logo">
     <img src="images/gisoe.png" style="width:48px;" alt="Logo">
  </span>
  <div>
    <div class="header-title">Gisoe Coffee</div>
    <div class="header-subtitle">Nikmati setiap tegukan</div>
  </div>
</header>

<!-- Filter Bar -->
<div class="filter-bar">
  <span class="filter-label">Kategori:</span>
  <div class="filter-chips" id="catChips"></div>
  <div class="filter-divider"></div>
  <span class="filter-label">Varian:</span>
  <select class="filter-select" id="variantSelect">
    <option value="Semua">Semua Varian</option>
  </select>
  <span class="filter-count" id="filterCount"></span>
</div>

<!-- Main Product Grid -->
<main class="main">
  <div class="product-grid" id="productGrid"></div>
</main>

<!-- Floating Cart Button -->
<button class="cart-fab" id="cartFab" onclick="openCartModal()">
  🛒
  <span class="cart-badge" id="cartBadge">0</span>
</button>

<!-- Cart Modal -->
<div class="modal-overlay" id="cartModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">🛒 Keranjang Belanja</span>
      <button class="modal-close" onclick="closeCartModal()">✕</button>
    </div>
    <div class="modal-body" id="cartBody"></div>
    <div class="modal-footer" id="cartFooter" style="display:none">
      <div class="cart-total-row">
        <span class="cart-total-label">Total Belanja</span>
        <span class="cart-total-value" id="cartTotal">Rp 0</span>
      </div>
      <button class="btn-primary" id="checkoutBtn" onclick="goToCheckout()">
        Lanjutkan Pembelian ›
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="js/products.js"></script>
<script src="js/app.js"></script>
</body>
</html>
